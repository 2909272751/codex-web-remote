<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="color-scheme" content="dark"><title>Codex Remote Terminal</title><link rel="stylesheet" href="/vendor/xterm.css"><link rel="stylesheet" href="/terminal.css"></head><body>
<section id="loginView" class="login hidden"><form id="loginForm"><div class="mark">CX</div><h1>Codex Remote</h1><p>连接这台电脑上的官方 Codex CLI</p><input id="password" type="password" placeholder="访问密码" autocomplete="current-password" required minlength="8"><button>登录</button><div id="loginError" class="error"></div></form></section>
<main id="terminalView" class="shell hidden"><aside id="sidebar"><header><strong>ChatGPT <em>Codex</em></strong><button id="closeSidebar">×</button></header><button id="newSession" class="primary">＋ 新任务</button><input id="search" type="search" placeholder="搜索历史任务"><div class="label">任务</div><nav id="threadList"></nav><footer><button id="refresh">↻ 刷新</button><button id="logout">退出</button></footer></aside>
<section class="workspace"><header class="topbar"><button id="menu">☰</button><div><strong id="title">Codex CLI</strong><small id="status">正在检查状态…</small></div><div class="top-actions"><button id="start">进入终端</button><button id="release" class="hidden">退出 CLI 并打开 App</button></div></header>
<div id="terminalWrap"><div id="terminal"></div><div id="terminalEmpty"><h2>官方 Codex CLI</h2><p>选择左侧任务，然后进入终端。模型、思考强度和权限均使用官方交互。</p></div></div>
<div id="uploadTray" class="upload-tray hidden"></div>
<div class="shortcuts"><button data-key="\u001b">Esc</button><button data-key="\u0003">中断</button><button data-key="\u001b[A">↑</button><button data-key="\u001b[B">↓</button><button data-command="/model\r">模型/思考</button><button data-command="/permissions\r">权限/完全访问</button><label>＋ 文件/图片<input id="fileInput" type="file" multiple hidden accept="image/*,.txt,.md,.json,.csv,.log,.pdf,.doc,.docx,.xls,.xlsx,.zip"></label></div>
<div class="connection"><span id="connectionDot"></span><span id="connectionText">未连接</span></div></section></main>
<div id="toast" class="toast hidden"></div><script src="/vendor/xterm.js"></script><script src="/vendor/addon-fit.js"></script><script type="module" src="/terminal.js"></script></body></html>
